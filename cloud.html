<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃老師的奇妙天空 - 造型雲朵生成器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', 'PingFang TC', 'Comic Sans MS', sans-serif;
        }

        #sky {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1a82f7 0%, #2f9fff 40%, #87cefa 100%);
            overflow: hidden;
        }

        /* 繽紛活潑的標題設計 */
        #app-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-size: 48px;
            font-weight: 900;
            display: flex;
            gap: 4px;
            text-shadow: 
                -3px -3px 0 #fff,  
                 3px -3px 0 #fff,
                -3px  3px 0 #fff,
                 3px  3px 0 #fff,
                 0px  8px 15px rgba(0,0,0,0.25);
            pointer-events: none;
            letter-spacing: 2px;
        }

        #app-title span {
            display: inline-block;
            animation: titleBounce 2s infinite alternate ease-in-out;
        }

        #app-title span:nth-child(1) { color: #FF595E; animation-delay: 0.0s; }
        #app-title span:nth-child(2) { color: #FFCA3A; animation-delay: 0.1s; }
        #app-title span:nth-child(3) { color: #8AC926; animation-delay: 0.2s; }
        #app-title span:nth-child(4) { color: #1982C4; animation-delay: 0.3s; }
        #app-title span:nth-child(5) { color: #6A4C93; animation-delay: 0.4s; }
        #app-title span:nth-child(6) { color: #FF924C; animation-delay: 0.5s; }
        #app-title span:nth-child(7) { color: #52A675; animation-delay: 0.6s; }
        #app-title span:nth-child(8) { color: #4361EE; animation-delay: 0.7s; }

        @keyframes titleBounce {
            0% { transform: translateY(0px) rotate(-3deg); }
            100% { transform: translateY(-12px) rotate(3deg); }
        }

        /* 音訊控制按鈕區 */
        #audio-controls {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 1001;
            display: flex;
            gap: 15px;
        }

        .audio-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1a82f7;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .audio-btn.muted {
            color: #ff595e;
            background: rgba(255, 255, 255, 0.5);
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.25);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        #item-input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.9);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        #submit-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background-color: #fff;
            color: #1a82f7;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        #submit-btn:hover {
            background-color: #f0f8ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .cloud-wrapper {
            position: absolute;
            left: -300px;
            --cloud-scale: 1; 
            animation: floatX linear infinite;
        }

        .cloud-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: floatY ease-in-out infinite;
        }

        .cloud-shape {
            color: #ffffff;
            font-size: 108px;
            filter: 
                drop-shadow(0px 8px 10px rgba(255, 255, 255, 0.95)) 
                drop-shadow(0px -5px 12px rgba(255, 255, 255, 0.85))
                drop-shadow(8px 0px 10px rgba(255, 255, 255, 0.8))
                blur(1.5px);
            opacity: 0.95;
        }

        .cloud-label {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            color: rgba(255, 255, 255, 1);
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        @keyframes floatX {
            0% { transform: translateX(0) scale(var(--cloud-scale)); }
            100% { transform: translateX(calc(100vw + 600px)) scale(var(--cloud-scale)); }
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @media (max-width: 600px) {
            #app-title { font-size: 32px; top: 25px; gap: 2px; }
            #audio-controls { top: 15px; right: 15px; gap: 10px; }
            .audio-btn { width: 40px; height: 40px; font-size: 16px; }
            #ui-container { bottom: 15px; padding: 10px 15px; }
            #item-input { padding: 10px 15px; font-size: 14px; }
            #submit-btn { padding: 10px 20px; font-size: 14px; }
            .cloud-shape { font-size: 81px; }
            .cloud-label { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="sky"></div>

    <h1 id="app-title">
        <span>黃</span><span>老</span><span>師</span><span>的</span><span>奇</span><span>妙</span><span>天</span><span>空</span>
    </h1>

    <!-- 音訊控制按鈕 -->
    <div id="audio-controls">
        <button id="bgm-btn" class="audio-btn muted" title="切換背景音樂">
            <i class="fa-solid fa-music"></i>
        </button>
        <button id="sfx-btn" class="audio-btn" title="切換音效">
            <i class="fa-solid fa-volume-high"></i>
        </button>
    </div>

    <div id="ui-container">
        <input type="text" id="item-input" placeholder="輸入詞彙 (支援近千個中英文名詞...)" autocomplete="off">
        <button id="submit-btn">變出雲朵 ☁️</button>
    </div>

    <script>
        // --- Web Audio API 聲音生成系統 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let isSfxEnabled = true;
        let isBgmEnabled = false; // 預設關閉，等待使用者互動開啟
        let bgmInterval;
        let audioInitialized = false;

        // 定義各個和弦的琶音 (頻率 Hz)
        const C_maj = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 329.63]; // C4, E4, G4, C5
        const G_maj = [196.00, 246.94, 293.66, 392.00, 293.66, 246.94, 196.00, 246.94]; // G3, B3, D4, G4
        const A_min = [220.00, 261.63, 329.63, 440.00, 329.63, 261.63, 220.00, 261.63]; // A3, C4, E4, A4
        const F_maj = [174.61, 220.00, 261.63, 349.23, 261.63, 220.00, 174.61, 220.00]; // F3, A3, C4, F4
        const E_min = [164.81, 196.00, 246.94, 329.63, 246.94, 196.00, 164.81, 196.00]; // E3, G3, B3, E4
        const D_min = [146.83, 174.61, 220.00, 293.66, 220.00, 174.61, 146.83, 174.61]; // D3, F3, A3, D4

        // 組合成長達 32 秒的 16 小節和弦進行 (128 個音符 * 0.25 秒 = 32 秒)
        const notes = [
            ...C_maj, ...G_maj, ...A_min, ...F_maj, // 小節 1-4
            ...C_maj, ...G_maj, ...F_maj, ...G_maj, // 小節 5-8
            ...A_min, ...E_min, ...F_maj, ...C_maj, // 小節 9-12
            ...D_min, ...G_maj, ...C_maj, ...C_maj  // 小節 13-16
        ];
        
        let noteIndex = 0;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            audioInitialized = true;
        }

        // 播放可愛的「波」音效
        function playSfx() {
            if (!isSfxEnabled || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            // 頻率快速上升產生「波」的感覺
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            
            // 音量快速衰減
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

            osc.start(now);
            osc.stop(now + 0.1);
        }

        // 播放背景音樂的單個音符
        function playBgmNote() {
            if (!isBgmEnabled || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle'; // 柔和的音色
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(notes[noteIndex], now);
            
            // 柔和的音量包絡線
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.05, now + 0.05); // 音量較小，不刺耳
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.45); // 延音變長

            osc.start(now);
            osc.stop(now + 0.5); // 延長單個音符的存活時間

            noteIndex = (noteIndex + 1) % notes.length;
        }

        function startBgm() {
            if (!bgmInterval) {
                bgmInterval = setInterval(playBgmNote, 250); // 每 250ms 播放一個音符
            }
        }

        function stopBgm() {
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
        }

        // --- UI 與按鈕事件 ---
        const bgmBtn = document.getElementById('bgm-btn');
        const sfxBtn = document.getElementById('sfx-btn');

        bgmBtn.addEventListener('click', () => {
            initAudio();
            isBgmEnabled = !isBgmEnabled;
            if (isBgmEnabled) {
                bgmBtn.classList.remove('muted');
                bgmBtn.innerHTML = '<i class="fa-solid fa-music"></i>';
                startBgm();
            } else {
                bgmBtn.classList.add('muted');
                bgmBtn.innerHTML = '<i class="fa-solid fa-music-slash"></i>';
                stopBgm();
            }
        });

            isSfxEnabled = !isSfxEnabled;
            if (isSfxEnabled) {

                sfxBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';

            'fa-ear-listen': ['ear', '耳朵', '耳', 'hearing', '聽覺'],
            'fa-music': ['music', '音樂', '音符', 'note', 'song', '歌曲', 'melody', '旋律'],
            'fa-guitar': ['guitar', '吉他', 'bass', '貝斯', 'instrument', '樂器'],
            'fa-shirt': ['shirt', '衣服', '襯衫', 't-shirt', 'clothes', '服裝', 'jacket', '外套'],
            'fa-socks': ['socks', '襪子', 'sock', '襪'],
            'fa-shoe-prints': ['shoe', '鞋子', 'shoes', 'boots', '靴子', 'sneakers', '運動鞋'],
            'fa-hat-wizard': ['hat', '帽子', 'cap', '棒球帽', 'helmet', '安全帽'],
            'fa-bag-shopping': ['bag', '包包', '袋子', '背包', 'backpack', 'purse', '錢包', 'wallet'],
            'fa-coins': ['coin', '硬幣', '錢', 'money', 'cash', '現金', '財富', 'wealth'],
            'fa-gem': ['gem', '寶石', '鑽石', 'diamond', 'jewel', '珠寶', 'ring', '戒指'],
            'fa-trophy': ['trophy', '獎盃', '冠軍', 'champion', 'medal', '獎牌', 'award', '獎'],
            'fa-flag': ['flag', '旗子', '國旗', 'banner', '旗幟'],
            'fa-map': ['map', '地圖', '地圖', 'atlas', 'location', '地點'],
            'fa-globe': ['globe', '地球', '地球儀', 'world', '世界', 'planet', '行星'],
            'fa-ghost': ['ghost', '鬼', '幽靈', 'spirit', '靈魂', 'monster', '怪物'],
            'fa-robot': ['robot', '機器人', 'bot', 'android', 'cyborg', 'ai'],
            'fa-alien': ['alien', '外星人', 'ufo', '飛碟', 'martian', '火星人'],
            'fa-snowman': ['snowman', '雪人', '白熊', '北極熊', 'polar bear'],
            'fa-anchor': ['anchor', '錨', '船錨']
        };

        const shapeDict = {};
        for (const [icon, words] of Object.entries(iconMappings)) {
            words.forEach(word => {
                shapeDict[word.toLowerCase()] = icon;
            });
        }

        function createCloud(text, playSound = true) {
            if (!text.trim()) return;

            // 確保音訊系統已啟動 (使用者第一次互動)
            if (playSound) {
                initAudio();
                playSfx();
                
                // 如果背景音樂按鈕是開啟狀態，且尚未播放，則開始播放
                if (isBgmEnabled && !bgmInterval) {
                    startBgm();
                }
            }

            const lowerText = text.toLowerCase().trim();
            const iconClass = shapeDict[lowerText] ? `fa-solid ${shapeDict[lowerText]}` : 'fa-solid fa-cloud';

            const wrapper = document.createElement('div');
            wrapper.className = 'cloud-wrapper';

            const inner = document.createElement('div');
            inner.className = 'cloud-inner';

            const shape = document.createElement('i');
            shape.className = `${iconClass} cloud-shape`;
            inner.appendChild(shape);

            const label = document.createElement('div');
            label.className = 'cloud-label';
            label.innerText = text;
            inner.appendChild(label);
            
            wrapper.appendChild(inner);

            const scale = Math.random() * 1.0 + 0.3; 
            const baseDuration = 35; 
            const durationX = baseDuration / scale + (Math.random() * 8 - 4); 
            const zIndex = Math.floor(scale * 10);

            const durationY = Math.random() * 3 + 4; 
            const delayY = Math.random() * -5; 

            const topPosition = Math.random() * 60 + 15; 

            wrapper.style.setProperty('--cloud-scale', scale);
            wrapper.style.top = `${topPosition}%`;
            wrapper.style.animationDuration = `${durationX}s`;
            wrapper.style.zIndex = zIndex;

            inner.style.animationDuration = `${durationY}s`;
            inner.style.animationDelay = `${delayY}s`;

            if (scale < 0.7) {
                shape.style.opacity = scale + 0.3;
            }

            sky.appendChild(wrapper);

            setTimeout(() => {
                if(wrapper.parentNode) {
                    wrapper.parentNode.removeChild(wrapper);
                }
            }, durationX * 1000);
        }

        btn.addEventListener('click', () => {
            createCloud(input.value);
            input.value = '';
            input.focus();
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                createCloud(input.value);
                input.value = '';
            }
        });

        // 初始載入的雲朵 (不觸發音效，避免瀏覽器阻擋)
        window.onload = () => {
            createCloud('馬', false);
            setTimeout(() => createCloud('孔雀', false), 2000);
            setTimeout(() => createCloud('白熊', false), 5000);
            setTimeout(() => createCloud('白兔', false), 8000);
        };
    </script>
